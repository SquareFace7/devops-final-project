---
- name: deploy nodejs application
  hosts: all
  become: true

  tasks:
    - name: install standard packages
      package:
        name: 
          - httpd
          - git
        state: present

    # שלב חדש: מסירים כל גרסת nodejs קיימת כדי לוודא ניקיון
    - name: remove existing nodejs
      package:
        name: nodejs
        state: absent

    - name: setup nodejs repository
      shell: curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -

    - name: clean package cache
      shell: dnf clean all

    - name: install nodejs
      package:
        name: nodejs
        state: present
        update_cache: yes

    # בדיקה מהירה לראות איזו גרסה הותקנה כדי שנוכל לראות בלוג אם הצלחנו
    - name: check node version
      shell: node -v
      register: node_version
    - debug: msg="Node version is {{ node_version.stdout }}"

    - name: starting httpd service
      service:
        name: httpd
        state: started
        enabled: true

    - name: clone git repo
      ansible.builtin.git:
        repo: "https://github.com/SquareFace7/devops-final-project.git"
        dest: /tmp/my_game
        force: yes

    - name: install dependencies
      command: npm install
      args:
        chdir: /tmp/my_game/Game

    - name: build the project
      command: npm run build
      args:
        chdir: /tmp/my_game/Game

    - name: remove old files
      shell: rm -rf /var/www/html/*

    - name: copy build result to web root
      shell: cp -r /tmp/my_game/Game/dist/* /var/www/html/
