---
- name: deploy nodejs application
  hosts: all
  become: true

  tasks:
    - name: install standard packages
      package:
        name: 
          - httpd
          - git
        state: present

    # משימה חדשה: התקנת מאגר הגרסאות החדש של Node.js
    - name: setup nodejs repository
      shell: curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -

    - name: install nodejs
      package:
        name: nodejs
        state: present

    - name: starting httpd service
      service:
        name: httpd
        state: started
        enabled: true

    - name: clone git repo
      ansible.builtin.git:
        repo: "https://github.com/SquareFace7/devops-final-project.git"
        dest: /tmp/my_game

    - name: install dependencies
      command: npm install
      args:
        chdir: /tmp/my_game/Game

    - name: build the project
      command: npm run build
      args:
        chdir: /tmp/my_game/Game

    - name: remove old files
      shell: rm -rf /var/www/html/*

    - name: copy build result to web root
      # אם התיקייה אצלך היא build במקום dist, תשנה כאן
      shell: cp -r /tmp/my_game/Game/dist/* /var/www/html/
