<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Project Eliad Hagag</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #2c3e50; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        h1 { color: #ecf0f1; }
        p { font-size: 1.2em; color: #bdc3c7; }
        canvas { background-color: #70c5ce; display: block; margin: 20px auto; border: 4px solid #fff; border-radius: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: pointer; }
        .instructions { margin-top: 10px; font-size: 0.9em; color: #95a5a6; }
    </style>
</head>
<body>
    <h1>פרויקט הגמר ב-DevOps - אליעד חג'ג'</h1>
    <p>התשתית הוקמה אוטומטית בענן באמצעות Terraform ו-Ansible 🚀</p>
    <canvas id="gameCanvas" width="320" height="480"></canvas>
    <div class="instructions">לחץ על העכבר או על המסך כדי לקפוץ</div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let frames = 0, score = 0, best = 0;
        
        const state = { current: 0, getReady: 0, game: 1, over: 2 };
        
        const bird = {
            x: 50, y: 150, w: 20, h: 20, gravity: 0.25, velocity: 0, jump: -4.6,
            draw() { ctx.fillStyle = '#f1c40f'; ctx.fillRect(this.x, this.y, this.w, this.h); },
            update() {
                this.velocity += this.gravity; this.y += this.velocity;
                if(this.y + this.h >= canvas.height) { this.y = canvas.height - this.h; this.velocity = 0; state.current = state.over; }
                if(this.y < 0) { this.y = 0; this.velocity = 0; }
            }
        };
        
        const pipes = {
            position: [], dx: 2,
            draw() {
                for(let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    ctx.fillStyle = '#2ecc71';
                    ctx.fillRect(p.x, p.y, 50, 200); // Top pipe
                    ctx.fillRect(p.x, p.y + 200 + 100, 50, canvas.height - (p.y + 200 + 100)); // Bottom pipe
                }
            },
            update() {
                if(frames % 100 === 0) { this.position.push({x: canvas.width, y: -150 + Math.random() * 100}); }
                for(let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    p.x -= this.dx;
                    if(p.x + 50 <= 0) { this.position.shift(); score++; best = Math.max(score, best); }
                    // Collision detection
                    if(bird.x + bird.w > p.x && bird.x < p.x + 50 && (bird.y < p.y + 200 || bird.y + bird.h > p.y + 200 + 100)) { state.current = state.over; }
                }
            }
        };
        
        document.addEventListener('mousedown', () => {
            switch(state.current) {
                case state.getReady: state.current = state.game; break;
                case state.game: bird.velocity = bird.jump; break;
                case state.over: pipes.position = []; score = 0; bird.velocity = 0; bird.y = 150; state.current = state.getReady; break;
            }
        });
        
        function draw() {
            ctx.fillStyle = '#70c5ce'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            bird.draw();
            if(state.current === state.getReady) {
                ctx.fillStyle = '#fff'; ctx.font = '24px Arial'; ctx.textAlign = "center";
                ctx.fillText('Click to Start', canvas.width/2, canvas.height/2);
            }
            if(state.current === state.game || state.current === state.over) { pipes.draw(); }
            if(state.current === state.over) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = '#e74c3c'; ctx.font = '36px Arial'; ctx.fillText('Game Over', canvas.width/2, canvas.height/2 - 40);
                ctx.fillStyle = '#fff'; ctx.font = '24px Arial';
                ctx.fillText('Score: ' + score, canvas.width/2, canvas.height/2);
                ctx.fillText('Best: ' + best, canvas.width/2, canvas.height/2 + 30);
                ctx.font = '16px Arial'; ctx.fillText('Click to Restart', canvas.width/2, canvas.height/2 + 80);
            }
            if(state.current === state.game) {
                ctx.fillStyle = '#fff'; ctx.font = '30px Arial'; ctx.textAlign = "left";
                ctx.fillText(score, 20, 40);
            }
        }
        
        function update() { if(state.current === state.game) { bird.update(); pipes.update(); } frames++; }
        function loop() { update(); draw(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
