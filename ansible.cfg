[defaults]
inventory = ./inventory_fixed.ini
host_key_checking = False
interpreter_python = auto_silent
remote_user = ec2-user
#private_key_file = ~/.ssh/id_rsa_aws

[inventory]
# הוספת 'host_list' ו-'script' ו-'ini' מאפשרת לאנסיבל לקרוא גם קבצים רגילים וגם דינמיים
enable_plugins = host_list, script, auto, yaml, ini, aws_ec2

[privilege_escalation]
become=true
become_method=sudo
become_user=root
become_ask_pass=false
